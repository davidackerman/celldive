<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Endosome — a nanoscale flythrough</title>
<style>
  :root{
    --bg:#05070d;
    --ink:#dfe9f5;
    --dim:#6b7a92;
    --accent:#7fe7ff;
    --good:#9dffb0;
    --line:rgba(127,231,255,0.22);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--ink)}
  #app{position:fixed;inset:0}
  canvas{display:block}

  .panel{
    position:absolute;padding:10px 12px;border:1px solid var(--line);
    background:rgba(5,7,13,0.55);backdrop-filter:blur(6px);
    font-size:12px;line-height:1.5;letter-spacing:.02em;
  }
  #hud-top{top:14px;left:14px;max-width:280px}
  #hud-top h1{margin:0 0 6px;font-size:12px;font-weight:600;letter-spacing:.14em;
    text-transform:uppercase;color:var(--accent)}
  #hud-top .sub{color:var(--dim);font-size:11px}
  .row{display:flex;justify-content:space-between;gap:14px}
  .row .k{color:var(--dim)}
  .row .v{color:var(--ink)}

  #obj{top:14px;right:14px;min-width:210px}
  #obj .label{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.16em}
  #obj .name{font-size:13px;margin-top:2px}
  #obj .dist{margin-top:8px;height:3px;background:rgba(255,255,255,.08);overflow:hidden}
  #obj .dist > i{display:block;height:100%;width:0;background:var(--accent);transition:width .15s}
  #obj.done .name{color:var(--good)}
  #obj.done .dist > i{background:var(--good)}

  #help{left:50%;bottom:16px;transform:translateX(-50%);text-align:center;color:var(--dim);
    font-size:11px;letter-spacing:.04em}
  #help b{color:var(--ink);font-weight:600}

  #cross{position:absolute;left:50%;top:50%;width:18px;height:18px;margin:-9px 0 0 -9px;
    pointer-events:none;opacity:.7}
  #cross:before,#cross:after{content:"";position:absolute;background:var(--accent)}
  #cross:before{left:8px;top:0;width:1px;height:18px}
  #cross:after{top:8px;left:0;height:1px;width:18px}

  #flash{position:absolute;left:50%;top:38%;transform:translateX(-50%);
    font-size:16px;letter-spacing:.18em;text-transform:uppercase;color:var(--good);
    opacity:0;transition:opacity .4s;pointer-events:none;text-shadow:0 0 18px rgba(157,255,176,.5)}
</style>
</head>
<body>
<div id="app"></div>

<div id="cross"></div>
<div id="flash"></div>

<div id="hud-top" class="panel">
  <h1>Endosome</h1>
  <div class="sub">procedural cell interior · swap in real CellMap meshes to make it data-driven</div>
  <div style="margin-top:8px">
    <div class="row"><span class="k">depth into cell</span><span class="v" id="depth">—</span></div>
    <div class="row"><span class="k">speed</span><span class="v" id="speed">—</span></div>
    <div class="row"><span class="k">found</span><span class="v" id="found">0 / 0</span></div>
  </div>
</div>

<div id="obj" class="panel">
  <div class="label">current objective</div>
  <div class="name" id="objName">—</div>
  <div class="dist"><i id="objBar"></i></div>
</div>

<div id="help" class="panel">
  <b>drag</b> to look &nbsp;·&nbsp; <b>W A S D</b> move &nbsp;·&nbsp; <b>R / F</b> up·down &nbsp;·&nbsp; <b>Shift</b> boost
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const THREE = window.THREE;
  const app = document.getElementById('app');

  // ---- renderer / scene -------------------------------------------------
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x05070d, 1);
  app.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x05070d, 0.006);

  const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.5, 4000);
  camera.position.set(0, 6, 70);

  // headlamp so you can see what you're flying toward, plus ambient fill
  scene.add(new THREE.AmbientLight(0x33415a, 1.1));
  const headlamp = new THREE.PointLight(0xbfd8ff, 1.4, 400, 2);
  camera.add(headlamp);
  scene.add(camera);
  const rim = new THREE.PointLight(0x4060a0, 0.8, 600);
  rim.position.set(-120, 80, -60);
  scene.add(rim);

  // ---- organic blob factory --------------------------------------------
  // deterministic pseudo-noise (no external libs) for membrane lumpiness
  function fbm(x,y,z){
    return 0.55*Math.sin(x*1.3 + y*0.7)
         + 0.30*Math.sin(y*1.7 + z*1.1 + 1.7)
         + 0.18*Math.sin(z*2.1 + x*0.5 + 4.2)
         + 0.10*Math.sin((x+y+z)*0.9 + 2.1);
  }
  function blob(radius, detail, amp, freq, mat, stretch){
    const g = new THREE.SphereGeometry(radius, detail, detail);
    const p = g.attributes.position;
    const v = new THREE.Vector3();
    for(let i=0;i<p.count;i++){
      v.fromBufferAttribute(p,i);
      const n = v.clone().normalize();
      const d = 1 + amp * fbm(n.x*freq, n.y*freq, n.z*freq);
      v.multiplyScalar(d);
      p.setXYZ(i, v.x, v.y, v.z);
    }
    g.computeVertexNormals();
    const m = new THREE.Mesh(g, mat);
    if(stretch) m.scale.set(stretch.x, stretch.y, stretch.z);
    return m;
  }
  function organelleMat(color, emissive, opacity){
    return new THREE.MeshStandardMaterial({
      color, emissive, emissiveIntensity:0.6,
      roughness:0.55, metalness:0.0,
      transparent: opacity!==undefined, opacity: opacity===undefined?1:opacity,
      side: THREE.DoubleSide, flatShading:false
    });
  }

  // ---- the "cell" -------------------------------------------------------
  const CELL_R = 95;

  // enclosing plasma membrane — viewed from the inside
  const membrane = blob(CELL_R, 96, 0.14, 1.4,
    new THREE.MeshStandardMaterial({
      color:0x21314f, emissive:0x0a1530, emissiveIntensity:0.5,
      roughness:0.9, metalness:0.0, side:THREE.BackSide,
      transparent:true, opacity:0.9
    }));
  scene.add(membrane);

  // collectible / objective organelles
  const targets = [];
  function addOrganelle(name, pos, mesh){
    mesh.position.copy(pos);
    mesh.userData.spin = (Math.random()-0.5)*0.2;
    mesh.userData.r = mesh.geometry.boundingSphere ? mesh.geometry.boundingSphere.radius : 10;
    mesh.geometry.computeBoundingSphere();
    scene.add(mesh);
    targets.push({name, mesh, found:false});
    return mesh;
  }

  // nucleus — big, warm, off-center
  addOrganelle('Nucleus',
    new THREE.Vector3(-22, -8, -30),
    blob(26, 64, 0.10, 1.7, organelleMat(0xffb25a, 0x6e3a08, 0.96)));

  // mitochondria — elongated magenta capsules
  const mitoMat = organelleMat(0xff5fa8, 0x5e0d33, 0.95);
  addOrganelle('Mitochondrion α', new THREE.Vector3(34, 12, -8),
    blob(8, 40, 0.22, 2.6, mitoMat, {x:2.4,y:0.9,z:0.9}));
  addOrganelle('Mitochondrion β', new THREE.Vector3(8, -26, 28),
    blob(7, 40, 0.22, 2.8, mitoMat.clone(), {x:2.6,y:0.85,z:0.95}));

  // lysosome — small purple sphere
  addOrganelle('Lysosome', new THREE.Vector3(40, -18, 26),
    blob(6, 40, 0.18, 3.0, organelleMat(0xb888ff, 0x2c0f55, 0.95)));

  // ER — translucent teal tubing, ambient scenery (not an objective)
  const erMat = organelleMat(0x4fd6c8, 0x09433c, 0.4);
  for(let i=0;i<3;i++){
    const er = new THREE.Mesh(new THREE.TorusKnotGeometry(14+i*5, 1.1, 140, 12, 2, 3), erMat);
    er.position.set(-30+i*22, 18-i*16, 10-i*24);
    er.rotation.set(Math.random()*3, Math.random()*3, 0);
    er.userData.driftSpin = 0.05;
    scene.add(er);
  }

  // faint floating "vesicles" for depth/parallax
  const dust = new THREE.Group();
  const dgeo = new THREE.SphereGeometry(0.5, 6, 6);
  const dmat = new THREE.MeshBasicMaterial({color:0x6f86ad, transparent:true, opacity:0.5});
  for(let i=0;i<260;i++){
    const d = new THREE.Mesh(dgeo, dmat);
    d.position.set((Math.random()-0.5)*CELL_R*1.7,(Math.random()-0.5)*CELL_R*1.7,(Math.random()-0.5)*CELL_R*1.7);
    dust.add(d);
  }
  scene.add(dust);

  // ---- controls: drag-look + WASD fly (iframe-safe, no pointer lock) ----
  const keys = {};
  addEventListener('keydown', e=>{ keys[e.code]=true; });
  addEventListener('keyup',   e=>{ keys[e.code]=false; });

  let dragging=false, lastX=0, lastY=0, yaw=0, pitch=0;
  const el = renderer.domElement;
  el.style.cursor='grab';
  el.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; el.style.cursor='grabbing'; el.setPointerCapture(e.pointerId); });
  el.addEventListener('pointerup',   e=>{ dragging=false; el.style.cursor='grab'; });
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY;
    yaw   -= dx*0.0026;
    pitch -= dy*0.0026;
    pitch = Math.max(-1.45, Math.min(1.45, pitch));
  });

  const vel = new THREE.Vector3();
  const fwd = new THREE.Vector3();
  const right = new THREE.Vector3();
  const WORLD_UP = new THREE.Vector3(0,1,0);

  // ---- HUD --------------------------------------------------------------
  const ui = {
    depth: document.getElementById('depth'),
    speed: document.getElementById('speed'),
    found: document.getElementById('found'),
    objName: document.getElementById('objName'),
    objBar: document.getElementById('objBar'),
    obj: document.getElementById('obj'),
    flash: document.getElementById('flash'),
  };
  let foundCount=0, objIdx=0;
  ui.found.textContent = '0 / ' + targets.length;

  function nextObjective(){
    while(objIdx<targets.length && targets[objIdx].found) objIdx++;
    ui.obj.classList.remove('done');
    if(objIdx>=targets.length){ ui.objName.textContent='all organelles located'; ui.obj.classList.add('done'); return; }
    ui.objName.textContent = targets[objIdx].name;
  }
  nextObjective();

  function flash(msg){ ui.flash.textContent=msg; ui.flash.style.opacity=1; setTimeout(()=>ui.flash.style.opacity=0, 1100); }

  // ---- loop -------------------------------------------------------------
  const clock = new THREE.Clock();
  function tick(){
    const dt = Math.min(clock.getDelta(), 0.05);

    // orientation from yaw/pitch
    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
    camera.getWorldDirection(fwd);
    right.crossVectors(fwd, WORLD_UP).normalize();

    const boost = (keys['ShiftLeft']||keys['ShiftRight']) ? 2.6 : 1;
    const accel = 90 * boost;
    if(keys['KeyW']) vel.addScaledVector(fwd,  accel*dt);
    if(keys['KeyS']) vel.addScaledVector(fwd, -accel*dt);
    if(keys['KeyD']) vel.addScaledVector(right,  accel*dt);
    if(keys['KeyA']) vel.addScaledVector(right, -accel*dt);
    if(keys['KeyR']) vel.addScaledVector(WORLD_UP,  accel*dt);
    if(keys['KeyF']) vel.addScaledVector(WORLD_UP, -accel*dt);

    vel.multiplyScalar(0.90);              // damping → gliding feel
    camera.position.addScaledVector(vel, dt);

    // soft containment: stay inside the cell
    const d = camera.position.length();
    if(d > CELL_R-4){
      camera.position.multiplyScalar((CELL_R-4)/d);
      vel.multiplyScalar(0.3);
    }

    // gentle life in the scene
    targets.forEach(t=>{ t.mesh.rotation.y += t.mesh.userData.spin*dt; });
    scene.children.forEach(c=>{ if(c.userData.driftSpin) c.rotation.z += c.userData.driftSpin*dt; });
    dust.rotation.y += 0.01*dt;

    // objective proximity
    if(objIdx < targets.length){
      const t = targets[objIdx];
      const dist = camera.position.distanceTo(t.mesh.position);
      const reach = t.mesh.userData.r*2 + 14;
      const near = Math.max(0, Math.min(1, 1 - (dist-reach)/120));
      ui.objBar.style.width = (near*100).toFixed(0)+'%';
      if(dist < reach){
        t.found=true; foundCount++;
        ui.found.textContent = foundCount + ' / ' + targets.length;
        flash(t.name + ' located');
        nextObjective();
      }
    }

    // readouts
    ui.depth.textContent = (CELL_R - camera.position.length()).toFixed(0) + ' nm*';
    ui.speed.textContent = vel.length().toFixed(1);

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();

  addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
